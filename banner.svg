<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <!-- 手绘风格滤镜 -->
    <filter id="sketch" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#00000033"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="300" fill="#fef3c7" rx="15"/>
  
  <!-- 装饰性涂鸦 -->
  <g stroke="#fcd34d" stroke-width="3" fill="none" opacity="0.5">
    <circle cx="50" cy="50" r="20" stroke-dasharray="5,5"/>
    <circle cx="750" cy="250" r="15" stroke-dasharray="3,3"/>
    <path d="M 700 50 Q 720 30 740 50 T 780 50"/>
    <path d="M 30 250 L 50 230 L 70 250"/>
  </g>
  
  <!-- 标题 -->
  <text x="400" y="45" font-family="Comic Sans MS, Marker Felt, cursive" font-size="32" fill="#1e293b" text-anchor="middle" font-weight="bold">
    👋 Hi, I'm Jiaxuan Wang
  </text>
  <text x="400" y="75" font-family="Comic Sans MS, Marker Felt, cursive" font-size="18" fill="#64748b" text-anchor="middle">
    🤖 Robotics Engineer & Researcher
  </text>
  
  <!-- 机械臂组 -->
  <g transform="translate(150, 250)">
    
    <!-- 底座 -->
    <g filter="url(#shadow)">
      <ellipse cx="0" cy="0" rx="40" ry="15" fill="#64748b"/>
      <rect x="-35" y="-20" width="70" height="20" fill="#475569" rx="5"/>
      <ellipse cx="0" cy="-20" rx="35" ry="10" fill="#94a3b8"/>
    </g>
    
    <!-- 第一段手臂 -->
    <g id="arm-segment-1">
      <animateTransform attributeName="transform" type="rotate" 
        values="-15;15;-15" dur="3s" repeatCount="indefinite"/>
      
      <!-- 手臂 -->
      <rect x="-12" y="-120" width="24" height="100" fill="#3b82f6" rx="8" filter="url(#shadow)"/>
      <rect x="-8" y="-115" width="16" height="90" fill="#60a5fa" rx="5"/>
      
      <!-- 关节 -->
      <circle cx="0" cy="-120" r="15" fill="#1d4ed8" stroke="#1e40af" stroke-width="3"/>
      <circle cx="0" cy="-120" r="8" fill="#3b82f6"/>
      
      <!-- 第二段手臂 -->
      <g transform="translate(0, -120)">
        <g id="arm-segment-2">
          <animateTransform attributeName="transform" type="rotate" 
            values="20;-20;20" dur="2.5s" repeatCount="indefinite"/>
          
          <!-- 手臂 -->
          <rect x="-10" y="-100" width="20" height="80" fill="#10b981" rx="6" filter="url(#shadow)"/>
          <rect x="-6" y="-95" width="12" height="70" fill="#34d399" rx="4"/>
          
          <!-- 关节 -->
          <circle cx="0" cy="-100" r="12" fill="#059669" stroke="#047857" stroke-width="2"/>
          <circle cx="0" cy="-100" r="6" fill="#10b981"/>
          
          <!-- 爪子 -->
          <g transform="translate(0, -100)">
            <g id="gripper">
              <!-- 爪子底座 -->
              <circle cx="0" cy="0" r="10" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
              
              <!-- 左爪 -->
              <g id="gripper-left">
                <animateTransform attributeName="transform" type="rotate" 
                  values="0;15;0" dur="1.5s" repeatCount="indefinite"/>
                <path d="M -5 -5 L -20 -35 L -15 -40 L -5 -15 Z" fill="#fbbf24" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
                <circle cx="-18" cy="-38" r="4" fill="#fcd34d"/>
              </g>
              
              <!-- 右爪 -->
              <g id="gripper-right">
                <animateTransform attributeName="transform" type="rotate" 
                  values="0;-15;0" dur="1.5s" repeatCount="indefinite"/>
                <path d="M 5 -5 L 20 -35 L 15 -40 L 5 -15 Z" fill="#fbbf24" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
                <circle cx="18" cy="-38" r="4" fill="#fcd34d"/>
              </g>
            </g>
          </g>
        </g>
      </g>
    </g>
  </g>
  
  <!-- 代码装饰 -->
  <g font-family="monospace" font-size="13" fill="#64748b">
    <text x="350" y="130" opacity="0.8">def robot_arm():</text>
    <text x="360" y="150" opacity="0.8">arm.move(x, y, z)</text>
    <text x="360" y="170" opacity="0.8">gripper.grasp()</text>
    <text x="360" y="190" opacity="0.8">return success</text>
  </g>
  
  <!-- 技术栈标签 -->
  <g font-family="Comic Sans MS, cursive" font-size="11">
    <!-- Python -->
    <g transform="translate(550, 110)">
      <rect x="0" y="0" width="70" height="24" fill="#3776ab" rx="12"/>
      <rect x="0" y="0" width="35" height="24" fill="#ffd43b" rx="12"/>
      <text x="35" y="16" text-anchor="middle" fill="white" font-weight="bold">Python</text>
    </g>
    
    <!-- PyTorch -->
    <g transform="translate(630, 110)">
      <rect x="0" y="0" width="70" height="24" fill="#ee4c2c" rx="12"/>
      <text x="35" y="16" text-anchor="middle" fill="white" font-weight="bold">PyTorch</text>
    </g>
    
    <!-- ROS2 -->
    <g transform="translate(550, 145)">
      <rect x="0" y="0" width="70" height="24" fill="#22314e" rx="12"/>
      <text x="35" y="16" text-anchor="middle" fill="white" font-weight="bold">ROS2</text>
    </g>
    
    <!-- LeRobot -->
    <g transform="translate(630, 145)">
      <rect x="0" y="0" width="70" height="24" fill="#ff6b00" rx="12"/>
      <text x="35" y="16" text-anchor="middle" fill="white" font-weight="bold">LeRobot</text>
    </g>
    
    <!-- SO-101 -->
    <g transform="translate(550, 180)">
      <rect x="0" y="0" width="70" height="24" fill="#6366f1" rx="12"/>
      <text x="35" y="16" text-anchor="middle" fill="white" font-weight="bold">SO-101</text>
    </g>
    
    <!-- VLA -->
    <g transform="translate(630, 180)">
      <rect x="0" y="0" width="70" height="24" fill="#8b5cf6" rx="12"/>
      <text x="35" y="16" text-anchor="middle" fill="white" font-weight="bold">VLA</text>
    </g>
  </g>
  
  <!-- 底部文字 -->
  <text x="400" y="275" font-family="Comic Sans MS, cursive" font-size="14" fill="#64748b" text-anchor="middle">
    🚀 Building the future of robotics, one line of code at a time!
  </text>
  
  <!-- 装饰星星 -->
  <g fill="#fbbf24">
    <text x="700" y="80" font-size="20">⭐</text>
    <text x="100" y="120" font-size="16">✨</text>
    <text x="720" y="200" font-size="18">🌟</text>
  </g>
</svg>